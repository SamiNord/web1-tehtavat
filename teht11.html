<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tehtävä 11</title>
</head>
<body>

<form action="http://codez.savonia.fi/jussi/api/test.php" method="get">

<table>

<tr>
<td>Oppilaitos:</td>
<td><input type="text" name="oppilaitos" value="Savonia AMK" readonly></td>
</tr>

<tr>
<td>Nimi:</td>
<td><input type="text" name="nimi"></td>
</tr>

<tr>
<td>Vuosikurssi:</td>

</tr>

<tr>
<td>Kurssin nimi:</td>
<td>
<select name="course" multiple>
<optgroup label="Pakolliset">
<option selected>Web-ohjelmointi 1</option>

<option>Fysiikka</option>

</select>

</tr>

<tr>
<td>Kurssin tyyppi:</td>
<td>
<select name="tyyppi">
<option>Lähiopetus</option>
<option>Etäopetus</option>
</select>
</td>
</tr>

<tr>
<td>Sukupuoli:</td>

<input type="radio" name="sukupuoli"> Mies
<input type="radio" name="sukupuoli"> Nainen

</td>
</tr>

<tr>
<td>Harrastukset:</td>
<td>
<input type="checkbox" name="hobbies"> Pelaaminen<br>
<input type="checkbox" name="hobbies"> Lenkkely<br>
<input type="checkbox" name="hobbies"> Kuntosali<br>
<input type="checkbox" name="hobbies"> Lukeminen
</td>
</tr>

<tr>
<td></td>
<td>
<input type="reset" value="Tyhjennä">
<input type="submit" value="Lähetä">
</td>
</tr>

</table>

<br>

<input type="image" src="koira.png" width="50">

</form>

</body>
</html>
